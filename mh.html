<div class="contact-container">
    <h2>Kontakta mig</h2>
    <p>Har du frågor om quizet eller hittat något fel? Skicka ett meddelande!</p>

    <form class="contact-form">
        <div class="input-group">
            <label for="contact-name">Namn</label>
            <input type="text" id="contact-name" placeholder="Ditt namn" required>
        </div>

        <div class="input-group">
            <label for="contact-email">E-post</label>
            <input type="email" id="contact-email" placeholder="Din e-postadress" required>
        </div>

        <div class="input-group">
            <label for="contact-message">Meddelande</label>
            <textarea id="contact-message" rows="5" placeholder="Skriv ditt meddelande här..." required></textarea>
        </div>

        <button type="submit" class="contact-btn">Skicka meddelande</button>
    </form>

    <hr class="divider">

    <div class="alt-contact">
        <p>Eller nå mig direkt på: <strong>hugo.barklund@skola.taby.se</strong></p>
    </div>
</div>
