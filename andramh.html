<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Historia</title>
        <link rel="stylesheet" href="yes.css" />
</head>
<body>

    <div class="quiz-container">
        <div class="quiz-header">
            <h1>Memoria Historia - Historiequiz</h1>
            <p>Testa dina kunskaper om andra världskrigets historia..</p>
        </div>

        <form id="history-quiz">
            <div class="question-card">
                <label class="question-text">1. Vilket år började andra världskriget?</label>
                <div class="options">
                    <label class="option-item">
                        <input type="radio" name="q1" value="1937"> 1937
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q1" value="1939"> 1939
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q1" value="1941"> 1941
                    </label>
                </div>
            </div>

            <div class="question-card">
                <label class="question-text" for="q2">2. Vem var statsminister av Storbrittanien under kriget?</label>
                <input type="text" id="q2" name="q2" placeholder="Ditt svar" class="text-input">
            </div>

            <div class="question-card">
                <label class="question-text">3. Vad var kodnamnet för invasionen av Normandie?</label>
                <div class="options">
                    <label class="option-item">
                        <input type="radio" name="q3" value="barbarossa"> Operation Barbarossa
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q3" value="overlord"> Operation Overlord
                    </label>
                    <label class="option-item">
                        <input type="radio" name="q3" value="torch"> Operation Torch
                    </label>
                </div>
            </div>

            <button type="submit" class="submit-btn">Lämna in</button>
        </form>
    </div>

</body>
</html>

</head>

</html>
